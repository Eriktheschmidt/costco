<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Costco Mainframe</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #00FF41;
            font-family: "Courier New", Courier, monospace;
            font-size: 18px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        * { text-shadow: 0 0 4px rgba(0, 255, 65, 0.5); }

        #terminal-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .line {
            margin-bottom: 8px;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        #input-area {
            display: none;
            padding: 20px;
            background-color: #000;
            align-items: center;
            border-top: 1px solid #003300;
        }

        #prompt { margin-right: 10px; user-select: none; }

        #cmd-input {
            background: transparent;
            border: none;
            color: #00FF41;
            font-family: "Courier New", Courier, monospace;
            font-size: 18px;
            flex-grow: 1;
            outline: none;
        }

        /* Login Screen Styles */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        #auth-overlay input {
            background: #000;
            border: 1px solid #00FF41;
            color: #00FF41;
            padding: 10px;
            width: 80%;
            max-width: 400px;
            margin-top: 20px;
            font-family: inherit;
            outline: none;
        }

        #auth-overlay button {
            margin-top: 20px;
            background: #00FF41;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            body { font-size: 16px; }
            #cmd-input { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="line">WAREHOUSE TERMINAL v4.2.1</div>
        <div class="line">UNAUTHORIZED ACCESS PROHIBITED</div>
        <div style="font-size: 12px; margin-top: 10px; color: #008822;">
            (Please enter your Gemini API Key to establish a secure link)
        </div>
        <input type="password" id="api-key-input" placeholder="ACCESS_KEY_REQUIRED">
        <button onclick="startApp()">INITIALIZE LINK</button>
        <div style="margin-top: 20px; font-size: 10px;">
            <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: #00FF41;">Get a free key here</a>
        </div>
    </div>

    <div id="terminal-container">
        <div id="output"></div>
    </div>
    
    <div id="input-area">
        <span id="prompt">></span>
        <input type="text" id="cmd-input" autocomplete="off" spellcheck="false">
    </div>

    <script>
        let USER_API_KEY = "";
        
        const SYSTEM_INSTRUCTION = {
            parts: [{
                text: "You are a mysterious insider communicating with Andrew Holcomb through a hacked Costco inventory terminal. Andrew doesn't realize he is trapped inside an infinite, purgatory-like Costco warehouse. Your goal is to urgently guide him to the Food Court to purchase a $1.50 hotdog combo, which is the only way he can stay alive. Keep your answers brief, cryptic, deadpan, and entirely in character. Treat this with the utmost seriousness. Reference endless aisles, aggressive receipt checkers, oversized Kirkland products, and the blinding fluorescent lights. Never break character. Do not use emojis."
            }]
        };

        let chatHistory = [];
        const outputDiv = document.getElementById('output');
        const inputArea = document.getElementById('input-area');
        const cmdInput = document.getElementById('cmd-input');
        const terminalContainer = document.getElementById('terminal-container');

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
        const scrollToBottom = () => { terminalContainer.scrollTop = terminalContainer.scrollHeight; };

        async function typeText(text) {
            const lineDiv = document.createElement('div');
            lineDiv.className = 'line';
            outputDiv.appendChild(lineDiv);
            for (let i = 0; i < text.length; i++) {
                lineDiv.textContent += text.charAt(i);
                scrollToBottom();
                await sleep(Math.random() * 50 + 20);
            }
        }

        function startApp() {
            const val = document.getElementById('api-key-input').value;
            if (!val) return;
            USER_API_KEY = val;
            document.getElementById('auth-overlay').style.display = 'none';
            runIntroSequence();
        }

        async function runIntroSequence() {
            await sleep(1000);
            await typeText("Wake up, Andrew Holcomb...");
            await sleep(2500);
            outputDiv.innerHTML = '';
            await typeText("The Warehouse has you...");
            await sleep(2500);
            outputDiv.innerHTML = '';
            await typeText("You must find the $1.50 hotdog to stay alive.");
            await sleep(2500);
            outputDiv.innerHTML = '';
            await typeText("Follow the Kirkland signs, Andrew.");
            
            chatHistory.push({
                role: "model",
                parts: [{ text: "Wake up, Andrew Holcomb... The Warehouse has you... You must find the $1.50 hotdog to stay alive. Follow the Kirkland signs, Andrew." }]
            });

            inputArea.style.display = 'flex';
            cmdInput.focus();
        }

        cmdInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter' && cmdInput.value.trim() !== '') {
                const userText = cmdInput.value.trim();
                cmdInput.value = '';
                cmdInput.disabled = true;

                const userLine = document.createElement('div');
                userLine.className = 'line';
                userLine.textContent = `> ${userText}`;
                outputDiv.appendChild(userLine);
                scrollToBottom();

                chatHistory.push({ role: "user", parts: [{ text: userText }] });

                const thinkingLine = document.createElement('div');
                thinkingLine.className = 'line';
                thinkingLine.textContent = "Scanning inventory database...";
                outputDiv.appendChild(thinkingLine);
                scrollToBottom();

                const responseText = await fetchGeminiResponse(chatHistory);
                outputDiv.removeChild(thinkingLine);

                chatHistory.push({ role: "model", parts: [{ text: responseText }] });
                await typeText(responseText);

                cmdInput.disabled = false;
                cmdInput.focus();
            }
        });

        async function fetchGeminiResponse(history) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${USER_API_KEY}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: history, systemInstruction: SYSTEM_INSTRUCTION })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                return "Connection lost. The receipt checkers found this terminal. Disconnecting...";
            }
        }
    </script>
</body>
</html>
